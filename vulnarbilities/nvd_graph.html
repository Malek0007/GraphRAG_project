e results in sql injection. The attack can be initiated remotely. The exploit has been made public and could be used."}, {"color": "#7f8c8d", "id": "ref:14d1ee8afd33", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#7f8c8d", "id": "ref:5bd8fb2ab1bc", "label": "vuldb.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e vuldb.com\n    "}, {"color": "#7f8c8d", "id": "ref:ed67aeff8464", "label": "vuldb.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e vuldb.com\n    "}, {"color": "#7f8c8d", "id": "ref:538516a6412c", "label": "vuldb.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e vuldb.com\n    "}, {"color": "#e74c3c", "id": "CVE-2026-21430", "label": "CVE-2026-21430", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cve\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CVE-2026-21430\n    \u003cbr\u003e\u003cbr\u003e\u003cb\u003eDescription:\u003c/b\u003e\u003cbr\u003eEmlog is an open source website building system. In version 2.5.23, article creation functionality is vulnerable to cross-site request forgery (CSRF). This can lead to a user being forced to post an article with arbitrary, attacker-controlled content. This, when combined with stored cross-site scripting, leads to account takeover. As of time of publication, no known patched versions are available."}, {"color": "#f39c12", "id": "CWE-352", "label": "CWE-352", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cwe\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CWE-352\n    "}, {"color": "#f39c12", "id": "CWE-79", "label": "CWE- 21433", "label": "CVE-2026-21433", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cve\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CVE-2026-21433\n    \u003cbr\u003e\u003cbr\u003e\u003cb\u003eDescription:\u003c/b\u003e\u003cbr\u003eEmlog is an open source website building system. Versions up to and including 2.5.19 are vulnerable to server-side Out-of-Band (OOB) requests / SSRF via uploaded SVG files. An attacker can upload a crafted SVG to http[:]//emblog/admin/media[.]php which contains external resource references. When the server processes/renders the SVG (thumbnailing, preview, or sanitization), it issues an HTTP request to the attacker-controlled host. Impact: server-side SSRF/OOB leading to internal network probing "}, {"color": "#f39c12", "id": "CWE-918", "label": "CWE-918", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cwe\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CWE-918\n    "}, {"color": "#8e44ad", "id": "cpe:2.3:a:emlog:emlog:*:*:*:*:pro:*:*:*", "label": "emlog:emlog:*", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cpe\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e emlog:emlog:*\n    "}, {"color": "#7f8c8d", "id": "ref:17434ca33b08", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#e74c3c", "id": "CVE-2026-21440", "label": "CVE-2026-21440", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cve\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CVE-2026-21440\n    \u003cbr\u003e\u003cbr\u003e\u003cb\u003eDescription:\u003c/b\u003e\u003cbr\u003eAdonisJS is a TypeScript-first web framework. A Path Traversal vulnerability in AdonisJS multipart file handling may allow a remote attacker to write arbitrary files to arbitrary locations on the server filesystem. This impacts @adonisjs/bodyparser through version 10.1.1 and 11.x prerelease versions prior to 11.0.0-next.6. This issue has been patched in @adonisjs/bodyparser versions 10.1.2 and 11.0.0-next.6."}, {"color": "#f39c12", "id": "CWE-22", "label": "CWE-22", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cwe\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CWE-22\n    "}, {"color": "#7f8c8d", "id": "ref:b395c6d50156", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#7f8c8d", "id": "ref:8e809a78d8e1", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#7f8c8d", "id": "ref:e483f51d5c4c", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#7f8c8d", "id": "ref:2cf196d18ac1", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#7f8c8d", "id": "ref:12450fda2a07", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#e74c3c", "id": "CVE-2026-21444", "label": "CVE-2026-21444", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cve\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CVE-2026-21444\n    \u003cbr\u003e\u003cbr\u003e\u003cb\u003eDescription:\u003c/b\u003e\u003cbr\u003elibtpms, a library that provides software emulation of a Trusted Platform Module, has a flaw in versions 0.10.0 and 0.10.1. The commonly used integration of libtpms with OpenSSL 3.x contained a vulnerability related to the returned IV (initialization vector) when certain symmetric ciphers were used. Instead of returning the last IV it returned the initial IV to the caller, thus weakening the subsequent encryption and decryption steps. The highest threat from this vulnerability is to data confide"}, {"color": "#f39c12", "id": "CWE-327", "label": "CWE-327", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cwe\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CWE-327\n    "}, {"color": "#f39c12", "id": "CWE-330", "label": "CWE-330", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cwe\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CWE-330\n    "}, {"color": "#7f8c8d", "id": "ref:18e492d85c4f", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#7f8c8d", "id": "ref:027c52039492", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#7f8c8d", "id": "ref:29573f18dec6", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#e74c3c", "id": "CVE-2026-0571", "label": "CVE-2026-0571", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cve\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CVE-2026-0571\n    \u003cbr\u003e\u003cbr\u003e\u003cb\u003eDescription:\u003c/b\u003e\u003cbr\u003eA security flaw has been discovered in yeqifu warehouse up to aaf29962ba407d22d991781de28796ee7b4670e4. Affected by this issue is the function createResponseEntity of the file warehouse\\src\\main\\java\\com\\yeqifu\\sys\\common\\AppFileUtils.java. The manipulation of the argument path results in path traversal. The attack may be launched remotely. The exploit has been released to the public and may be used for attacks. This product operates on a rolling release basis, ensuring continuous delivery. Cons"}, {"color": "#8e44ad", "id": "cpe:2.3:a:yeqifu:warehouse:*:*:*:*:*:*:*:*", "label": "yeqifu:warehouse:*", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cpe\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e yeqifu:warehouse:*\n    "}, {"color": "#7f8c8d", "id": "ref:f8e419f720fb", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#7f8c8d", "id": "ref:3cd65abfc12a", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#7f8c8d", "id": "ref:c49816dd3643", "label": "vuldb.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e vuldb.com\n    "}, {"color": "#7f8c8d", "id": "ref:4c8d27db2420", "label": "vuldb.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e vuldb.com\n    "}, {"color": "#7f8c8d", "id": "ref:60eb39981033", "label": "vuldb.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e vuldb.com\n    "}, {"color": "#e74c3c", "id": "CVE-2026-21445", "label": "CVE-2026-21445", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cve\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CVE-2026-21445\n    \u003cbr\u003e\u003cbr\u003e\u003cb\u003eDescription:\u003c/b\u003e\u003cbr\u003eLangflow is a tool for building and deploying AI-powered agents and workflows. Prior to version 1.7.0.dev45, multiple critical API endpoints in Langflow are missing authentication controls. The issue allows any unauthenticated user to access sensitive user conversation data, transaction histories, and perform destructive operations including message deletion. This affects endpoints handling personal data and system operations that should require proper authorization. Version 1.7.0.dev45 contains"}, {"color": "#f39c12", "id": "CWE-306", "label": "CWE-306", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cwe\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CWE-306\n    "}, {"color": "#8e44ad", "id": "cpe:2.3:a:langflow:langflow:*:*:*:*:*:*:*:*", "label": "langflow:langflow:*", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cpe\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e langflow:langflow:*\n    "}, {"color": "#7f8c8d", "id": "ref:a0281ede9903", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#7f8c8d", "id": "ref:175c73084596", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#e74c3c", "id": "CVE-2026-21446", "label": "CVE-2026-21446", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cve\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CVE-2026-21446\n    \u003cbr\u003e\u003cbr\u003e\u003cb\u003eDescription:\u003c/b\u003e\u003cbr\u003eBagisto is an open source laravel eCommerce platform. In versions on the 2.3 branch prior to 2.3.10, API routes remain active even after initial installation is complete. The underlying API endpoints (`/install/api/*`) are directly accessible and exploitable without any authentication. An attacker can bypass the Ib installer entirely by calling the API endpoints directly. This allows any unauthenticated attacker to create admin accounts, modify application configurations, and potentially overwri"}, {"color": "#8e44ad", "id": "cpe:2.3:a:webkul:bagisto:*:*:*:*:*:*:*:*", "label": "webkul:bagisto:*", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cpe\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e webkul:bagisto:*\n    "}, {"color": "#7f8c8d", "id": "ref:70a75da73cc4", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#7f8c8d", "id": "ref:6597e0a8be84", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#e74c3c", "id": "CVE-2026-21447", "label": "CVE-2026-21447", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cve\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CVE-2026-21447\n    \u003cbr\u003e\u003cbr\u003e\u003cb\u003eDescription:\u003c/b\u003e\u003cbr\u003eBagisto is an open source laravel eCommerce platform. Prior to version 2.3.10, an Insecure Direct Object Reference vulnerability in the customer order reorder function allows any authenticated customer to add items from another customer\u0027s order to their own shopping cart by manipulating the order ID parameter. This exposes sensitive purchase information and enables potential fraud. Version 2.3.10 patches the issue."}, {"color": "#f39c12", "id": "CWE-639", "label": "CWE-639", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cwe\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CWE-639\n    "}, {"color": "#7f8c8d", "id": "ref:19639f680b56", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#7f8c8d", "id": "ref:6e7ecba9f4d1", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#e74c3c", "id": "CVE-2026-21448", "label": "CVE-2026-21448", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cve\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CVE-2026-21448\n    \u003cbr\u003e\u003cbr\u003e\u003cb\u003eDescription:\u003c/b\u003e\u003cbr\u003eBagisto is an open source laravel eCommerce platform. Versions prior to 2.3.10 are vulnerable to server-side template injection. When a normal customer orders any product, in the `add address` step they can inject a value to run in admin view. The issue can lead to remote code execution. Version 2.3.10 contains a patch."}, {"color": "#f39c12", "id": "CWE-1336", "label": "CWE-1336", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cwe\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CWE-1336\n    "}, {"color": "#7f8c8d", "id": "ref:6482cccb815f", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#e74c3c", "id": "CVE-2026-21449", "label": "CVE-2026-21449", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cve\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CVE-2026-21449\n    \u003cbr\u003e\u003cbr\u003e\u003cb\u003eDescription:\u003c/b\u003e\u003cbr\u003eBagisto is an open source laravel eCommerce platform. Versions prior to 2.3.10 are vulnerable to server-side template injection via first name and last name from a low-privilege user. Version 2.3.10 fixes the issue."}, {"color": "#7f8c8d", "id": "ref:e5f0ef2cc131", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#e74c3c", "id": "CVE-2026-21450", "label": "CVE-2026-21450", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cve\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CVE-2026-21450\n    \u003cbr\u003e\u003cbr\u003e\u003cb\u003eDescription:\u003c/b\u003e\u003cbr\u003eBagisto is an open source laravel eCommerce platform. Versions prior to 2.3.10 are vulnerable to server-side template injection via type parameter, which can lead to remote code execution or another exploitation. Version 2.3.10 fixes the issue."}, {"color": "#7f8c8d", "id": "ref:1636eac3dd9b", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#e74c3c", "id": "CVE-2026-21451", "label": "CVE-2026-21451", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cve\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CVE-2026-21451\n    \u003cbr\u003e\u003cbr\u003e\u003cb\u003eDescription:\u003c/b\u003e\u003cbr\u003eBagisto is an open source laravel eCommerce platform. A stored Cross-Site Scripting (XSS) vulnerability exists in Bagisto prior to version 2.3.10 within the CMS page editor. Although the platform normally attempts to sanitize `\u003cscript\u003e` tags, the filtering can be bypassed by manipulating the raw HTTP POST request before submission. As a result, arbitrary JavaScript can be stored in the CMS content and executed whenever the page is viewed or edited. This exposes administrators to a high-severity "}, {"color": "#7f8c8d", "id": "ref:9a8227cd8267", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color" ased blind SQL injection vulnerability in the webhook edit and scanner api endpoints that allow an authenticated attacker to execute arbitrary SQL queries against the MySQL database. Commit 9bdb3a75a98a7047b6d70144eb1da1655d6992a8 contains a patch."}, {"color": "#7f8c8d", "id": "ref:35da627a7cc8", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#7f8c8d", "id": "ref:db5ab9b83e8a", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#e74c3c", "id": "CVE-2026-21681", "label": "CVE-2026-21681", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cve\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CVE-2026-21681\n    \u003cbr\u003e\u003cbr\u003e\u003cb\u003eDescription:\u003c/b\u003e\u003cbr\u003eiccDEV provides a set of libraries and tools that allow for the interaction, manipulation, and application of International Color Consortium (ICC) color management profiles. Versions prior to 2.3.1.2 have a Undefined Behavior runtime error. This vulnerability affects users of the iccDEV library who process ICC color profiles. Version 2.3.1.2 contains a patch. No known workarounds are available."}, {"color": "#7f8c8d", "id": "ref:d3c20ddafb29", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#7f8c8d", "id": "ref:d7df8dd3d9ac", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#e74c3c", "id": "CVE-2026-21682", "label": "CVE-2026-21682", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cve\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CVE-2026-21682\n    \u003cbr\u003e\u003cbr\u003e\u003cb\u003eDescription:\u003c/b\u003e\u003cbr\u003eiccDEV provides a set of libraries and tools that allow for the interaction, manipulation, and application of International Color Consortium (ICC) color management profiles. Versions prior to 2.3.1.2 have a heap-buffer-overflow in `CIccXmlArrayType::ParseText()`. This vulnerability affects users of the iccDEV library who process ICC color profiles. Version 2.3.1.2 contains a patch. No known workarounds are available."}, {"color": "#7f8c8d", "id": "ref:4165134b9e03", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#7f8c8d", "id": "ref:1a99d7c92a03", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#7f8c8d", "id": "ref:40d0295c6d97", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#e74c3c", "id": "CVE-2026-22184", "label": "CVE-2026-22184", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cve\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CVE-2026-22184\n    \u003cbr\u003e\u003cbr\u003e\u003cb\u003eDescription:\u003c/b\u003e\u003cbr\u003ezlib versions up to and including 1.3.1.2 include a global buffer overflow in the untgz utility located under contrib/untgz. The vulnerability is limited to the standalone demonstration utility and does not affect the core zlib compression library. The flaw occurs when a user executes the untgz command with an excessively long archive name supplied via the command line, leading to an out-of-bounds write in a fixed-size global buffer."}, {"color": "#8e44ad", "id": "cpe:2.3:a:zlib:zlib:*:*:*:*:*:*:*:*", "label": "zlib:zlib:*", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cpe\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e zlib:zlib:*\n    "}, {"color": "#7f8c8d", "id": "ref:1b149f50a380", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#7f8c8d", "id": "ref:9f82552cf547", "label": "seclists.org", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e seclists.org\n    "}, {"color": "#7f8c8d", "id": "ref:717eca2300cc", "label": "vulncheck.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e vulncheck.com\n    "}, {"color": "#7f8c8d", "id": "ref:83c9346fb9a4", "label": "zlib.net", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e zlib.net\n    "}, {"color": "#7f8c8d", "id": "ref:eed74a570366", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#e74c3c", "id": "CVE-2026-22185", "label": "CVE-2026-22185", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cve\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CVE-2026-22185\n    \u003cbr\u003e\u003cbr\u003e\u003cb\u003eDescription:\u003c/b\u003e\u003cbr\u003eOpenLDAP Lightning Memory-Mapped Database (LMDB) versions up to and including 0.9.14, prior to commit 8e1fda8, contain a heap buffer underflow in the readline() function of mdb_load. When processing malformed input containing an embedded NUL byte, an unsigned offset calculation can underflow and cause an out-of-bounds read of one byte before the allocated heap buffer. This can cause mdb_load to crash, leading to a limited denial-of-service condition."}, {"color": "#7f8c8d", "id": "ref:bdf3aaac04c2", "label": "bugs.openldap.org", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e bugs.openldap.org\n    "}, {"color": "#7f8c8d", "id": "ref:5d8b2964bb27", "label": "seclists.org", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e seclists.org\n    "}, {"color": "#7f8c8d", "id": "ref:5037ffd18123", "label": "seclists.org", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e seclists.org\n    "}, {"color": "#7f8c8d", "id": "ref:02c3bd24f6dd", "label": "openldap.org", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e openldap.org\n    "}, {"color": "#7f8c8d", "id": "ref:72a967894538", "label": "vulncheck.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e vulncheck.com\n    "}, {"color": "#e74c3c", "id": "CVE-2026-22186", "label": "CVE-2026-22186", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cve\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CVE-2026-22186\n    \u003cbr\u003e\u003cbr\u003e\u003cb\u003eDescription:\u003c/b\u003e\u003cbr\u003eBio-Formats versions up to and including 8.3.0 contain an XML External Entity (XXE) vulnerability in the Leica Microsystems metadata parsing component (e.g., XLEF). The parser uses an insecurely configured DocumentBuilderFactory when processing Leica XML-based metadata files, allowing external entity expansion and external DTD loading. A crafted metadata file can trigger outbound network requests (SSRF), access local system resources where readable, or cause a denial of service during XML parsin"}, {"color": "#7f8c8d", "id": "ref:127bb90be3b1", "label": "docs.openmicroscopy.org", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e docs.openmicroscopy.org\n    "}, {"color": "#7f8c8d", "id": "ref:9e4c06641d4b", "label": "seclists.org", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e seclists.org\n    "}, {"color": "#7f8c8d", "id": "ref:cf887092a899", "label": "vulncheck.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e vulncheck.com\n    "}, {"color": "#e74c3c", "id": "CVE-2026-22187", "label": "CVE-2026-22187", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cve\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CVE-2026-22187\n    \u003cbr\u003e\u003cbr\u003e\u003cb\u003eDescription:\u003c/b\u003e\u003cbr\u003eBio-Formats versions up to and including 8.3.0 perform unsafe Java deserialization of attacker-controlled memoization cache files (.bfmemo) during image processing. The loci.formats.Memoizer class automatically loads and deserializes memo files associated with images without validation, integrity checks, or trust enforcement. An attacker who can supply a crafted .bfmemo file alongside an image can trigger deserialization of untrusted data, which may result in denial of service, logic manipulatio"}, {"color": "#f39c12", "id": "CWE-502", "label": "CWE-502", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cwe\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CWE-502\n    "}, {"color": "#7f8c8d", "id": "ref:f4128baa0d88", "label": "seclists.org", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e seclists.org\n    "}, {"color": "#7f8c8d", "id": "ref:5a835f3be4d8", "label": "vulncheck.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e vulncheck.com\n    "}, {"color": "#e74c3c", "id": "CVE-2026-22188", "label": "CVE-2026-22188", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cve\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CVE-2026-22188\n    \u003cbr\u003e\u003cbr\u003e\u003cb\u003eDescription:\u003c/b\u003e\u003cbr\u003ePanda3D versions up to and including 1.10.16 deploy-stub contains a denial of service vulnerability due to unbounded stack allocation. The deploy-stub executable allocates argv_copy and argv_copy2 using alloca() based directly on the attacker-controlled argc value without validation. Supplying a large number of command-line arguments can exhaust stack space and propagate uninitialized stack memory into Python interpreter initialization, resulting in a reliable crash and undefined behavior."}, {"color": "#f39c12", "id": "CWE-457", "label": "CWE-457", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cwe\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CWE-457\n    "}, {"color": "#f39c12", "id": "CWE-908", "label": "CWE-908", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cwe\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CWE-908\n    "}, {"color": "#8e44ad", "id": "cpe:2.3:a:cmu:panda3d:*:*:*:*:*:*:*:*", "label": "cmu:panda3d:*", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cpe\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e cmu:panda3d:*\n    "}, {"color": "#7f8c8d", "id": "ref:5e1c38409f0d", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u00 eName:\u003c/b\u003e seclists.org\n    "}, {"color": "#7f8c8d", "id": "ref:03a1a6a48d47", "label": "vulncheck.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e vulncheck.com\n    "}, {"color": "#e74c3c", "id": "CVE-2026-22190", "label": "CVE-2026-22190", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cve\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CVE-2026-22190\n    \u003cbr\u003e\u003cbr\u003e\u003cb\u003eDescription:\u003c/b\u003e\u003cbr\u003ePanda3D versions up to and including 1.10.16 egg-mkfont contains an uncontrolled format string vulnerability. The -gp (glyph pattern) command-line option is used directly as the format string for sprintf() with only a single argument supplied. If an attacker provides additional format specifiers, egg-mkfont may read unintended stack values and write the formatted output into generated .egg and .png files, resulting in disclosure of stack-resident memory and pointer values."}, {"color": "#f39c12", "id": "CWE-134", "label": "CWE-134", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cwe\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CWE-134\n    "}, {"color": "#7f8c8d", "id": "ref:a2a1588a95a8", "label": "seclists.org", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e seclists.org\n    "}, {"color": "#7f8c8d", "id": "ref:149e4be00056", "label": "vulncheck.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e vulncheck.com\n    "}, {"color": "#e74c3c", "id": "CVE-2026-21441", "label": "CVE-2026-21441", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cve\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CVE-2026-21441\n    \u003cbr\u003e\u003cbr\u003e\u003c isting `safe_extract_member()` function. Commit 4014c8475626f20f158921ae0cf98ed259ae4d59 fixes this issue."}, {"color": "#8e44ad", "id": "cpe:2.3:a:project-monai:monai:*:*:*:*:*:*:*:*", "label": "project-monai:monai:*", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cpe\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e project-monai:monai:*\n    "}, {"color": "#7f8c8d", "id": "ref:4dfb2097ba5a", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#7f8c8d", "id": "ref:add02c65f2b7", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#e74c3c", "id": "CVE-2026-21857", "label": "CVE-2026-21857", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cve\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CVE-2026-21857\n    \u003cbr\u003e\u003cbr\u003e\u003cb\u003eDescription:\u003c/b\u003e\u003cbr\u003eREDAXO is a PHP-based content management system. Prior to version 5.20.2, authenticated users with backup permissions can read arbitrary files within the webroot via path traversal in the Backup addon\u0027s file export functionality. The Backup addon does not validate the `EXPDIR` POST parameter against the UI-generated allowlist of permitted directories. An attacker can supply relative paths containing `../` sequences (or even absolute paths inside the document root) to include any readable file in"}, {"color": "#8e44ad", "id": "cpe:2.3:a:redaxo:redaxo:*:*:*:*:*:*:*:*", "label": "redaxo:redaxo:*", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cpe\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e redaxo:redaxo:*\n    "}, {"color": "#7f8c8d", "id": "ref:2085701b557d", "label": "github.com", "shape": "dot", " e tracking software. In versions 0.99.49 and below, an API has a Mass Assignment vulnerability which allows authenticated users to inject arbitrary fields into time entries, bypassing business logic controls via the customfields parameter. The affected endpoint uses the JavaScript spread operator (...customfields) to merge user-controlled input directly into the database document. While customfields is validated as an Object type, there is no validation of which k"}, {"color": "#f39c12", "id": "CWE-915", "label": "CWE-915", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cwe\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CWE-915\n    "}, {"color": "#7f8c8d", "id": "ref:f032db2ceed0", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#e74c3c", "id": "CVE-2026-21858", "label": "CVE-2026-21858", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cve\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CVE-2026-21858\n    \u003cbr\u003e\u003cbr\u003e\u003cb\u003eDescription:\u003c/b\u003e\u003cbr\u003en8n is an open source workflow automation platform. Versions starting with 1.65.0 and below 1.121.0 enable an attacker to access files on the underlying server through execution of certain form-based workflows. A vulnerable workflow could grant access to an unauthenticated remote attacker, resulting in exposure of sensitive information stored on the system and may enable further compromise depending on deployment configuration and workflow usage. This issue is fixed in version 1.121.0."}, {"color": "#8e44ad", "id": "cpe:2.3:a:n8n:n8n:*:*:*:*:*:node.js:*:*", "label": "n8n:n8n:*", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cpe\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e n8n:n8n:*\n    "}, {"color": "#7f8c8d", "id": "ref:79bc8ea18bf2", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#7f8c8d", "id": "ref:2fcccfed169b", "label": "cyera.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e cyera.com\n    "}, {"color": "#e74c3c", "id": "CVE-2026-21859", "label": "CVE-2026-21859", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cve\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CVE-2026-21859\n    \u003cbr\u003e\u003cbr\u003e\u003cb\u003eDescription:\u003c/b\u003e\u003cbr\u003eMailpit is an email testing tool and API for developers. Versions 1.28.0 and below have a Server-Side Request Forgery (SSRF) vulnerability in the /proxy endpoint, allowing attackers to make requests to internal network resources. The /proxy endpoint validates http:// and https:// schemes, but it does not block internal IP addresses, enabling attackers to access internal services and APIs. This vulnerability is limited to HTTP GET requests with minimal headers. The issue is fixed in version 1.28."}, {"color": "#8e44ad", "id": "cpe:2.3:a:axllent:mailpit:*:*:*:*:*:*:*:*", "label": "axllent:mailpit:*", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cpe\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e axllent:mailpit:*\n    "}, {"color": "#7f8c8d", "id": "ref:5b03131fe386", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#7f8c8d", "id": "ref:3076e8148f88", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#e74c3c", "id": "CVE-2026-21869", "label": "CVE-2026-21869", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cve\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CVE-2026-21869\n    \u003cbr\u003e\u003cbr\u003e\u003cb\u003eDescription:\u003c/b\u003e\u003cbr\u003ellama.cpp is an inference of several LLM models in C/C++. In commits 55d4206c8 and prior, the n_discard parameter is parsed directly from JSON input in the llama.cpp server\u0027s completion endpoints without validation to ensure it\u0027s non-negative. When a negative value is supplied and the context fills up, llama_memory_seq_rm/add receives a reversed range and negative offset, causing out-of-bounds memory writes in the token evaluation loop. This deterministic memory corruption can crash the process "}, {"color": "#8e44ad", "id": "cpe:2.3:a:ggml:llama.cpp:-:*:*:*:*:*:*:*", "label": "ggml:llama.cpp:-", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cpe\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e ggml:llama.cpp:-\n    "}, {"color": "#7f8c8d", "id": "ref:a2188185adc9", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#e74c3c", "id": "CVE-2026-21875", "label": "CVE-2026-21875", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cve\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CVE-2026-21875\n    \u003cbr\u003e\u003cbr\u003e\u003cb\u003eDescription:\u003c/b\u003e\u003cbr\u003eClipBucket v5 is an open source video sharing platform. Versions 5.5.2-#187 and below allow an attacker to perform Blind SQL Injection through the add comment section within a channel. When adding a comment within a channel, there is a POST request to the /actions/ajax.php endpoint. The obj_id parameter within the POST request to /actions/ajax.php is then used within the user_exists function of the upload/includes/classes/user.class. php file as the $id parameter. It is then used within the coun"}, {"color": "#8e44ad", "id": "cpe:2.3:a:oxygenz:clipbucket:*:*:*:*:*:*:*:*", "label": "oxygenz:clipbucket:*", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cpe\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e oxygenz:clipbucket:*\n    "}, {"color": "#7f8c8d", "id": "ref:9868cda68d7f", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#e74c3c", "id": "CVE-2026-21868", "label": "CVE-2026-21868", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cve\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CVE-2026-21868\n    \u003cbr\u003e\u003cbr\u003e\u003cb\u003eDescription:\u003c/b\u003e\u003cbr\u003eFlag Forge is a Capture The Flag (CTF) platform. Versions 2.3.2 and below have a Regular Expression Denial of Service (ReDoS) vulnerability in the user profile API endpoint (/api/user/[username]). The application constructs a regular expression dynamically using unescaped user input (the username parameter). An attacker can exploit this by sending a specially crafted username containing regex meta-characters (e.g., deeply nested groups or quantifiers), causing the MongoDB regex engine to consume"}, {"color": "#8e44ad", "id": "cpe:2.3:a:flagforge:flagforge:*:*:*:*:*:*:*:*", "label": "flagforge:flagforge:*", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cpe\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e flagforge:flagforge:*\n    "}, {"color": "#7f8c8d", "id": "ref:6f8483a6838b", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#e74c3c", "id": "CVE-2026-21877", "label": "CVE-2026-21877", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cve\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CVE-2026-21877\n    \u003cbr\u003e\u003cbr\u003e\u003cb\u003eDescription:\u003c/b\u003e\u003cbr\u003en8n is an open source workflow automation platform. In versions 0.121.2 and below, an authenticated attacker may be able to execute malicious code using the n8n service. This could result in full compromise and can impact both self-hosted and n8n Cloud instances. This issue is fixed in version 1.121.3. Administrators can reduce exposure by disabling the Git node and limiting access for untrusted users, but upgrading to the latest version is recommended."}, {"color": "#7f8c8d", "id": "ref:2440e91a19d6", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#7f8c8d", "id": "ref:f0402f1d6d12", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#e74c3c", "id": "CVE-2026-22035", "label": "CVE-2026-22035", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cve\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CVE-2026-22035\n    \u003cbr\u003e\u003cbr\u003e\u003cb\u003eDescription:\u003c/b\u003e\u003cbr\u003eGreenshot is an open source Windows screenshot utility. Versions 1.3.310 and below arvulnerable to OS Command Injection through unsanitized filename processing. The FormatArguments method in ExternalCommandDestination.cs:269 uses string.Format() to insert user-controlled filenames directly into shell commands without sanitization, allowing attackers to execute arbitrary commands by crafting malicious filenames containing shell metacharacters. This issue is fixed in version 1.3.311."}, {"color": "#f39c12", "id": "CWE-78", "label": "CWE-78", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cwe\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CWE-78\n    "}, {"color": "#8e44ad", "id": "cpe:2.3:a:getgreenshot:greenshot:*:*:*:*:*:*:*:*", "label": "getgreenshot:greenshot:*", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cpe\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e getgreenshot:greenshot:*\n    "}, {"color": "#7f8c8d", "id": "ref:617b2ad264bf", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#7f8c8d", "id": "ref:83206f0d6f6a", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#7f8c8d", "id": "ref:653e732f7072", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#e74c3c", "id": "CVE-2026-21879", "label": "CVE-2026-21879", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cve\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CVE-2026-21879\n    \u003cbr\u003e\u003cbr\u003e\u003cb\u003eDescription:\u003c/b\u003e\u003cbr\u003eKanboard is project management software focused on Kanban methodology. Versions 1.2.48 and below are vulnerable to an Open Redirect attack that allows malicious actors to redirect authenticated users to attacker-controlled websites. By crafting URLs such as //evil.com, attackers can bypass the filter_var($url, FILTER_VALIDATE_URL) validation check. This vulnerability could be exploited to conduct phishing attacks, steal user credentials, or distribute malware. The issue is fixed in version 1.2.4"}, {"color": "#f39c12", "id": "CWE-601", "label": "CWE-601", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u00 e\u003cb\u003eDescription:\u003c/b\u003e\u003cbr\u003eMissing Authorization vulnerability in Campaign Monitor Campaign Monitor for WordPress forms-for-campaign-monitor allows Exploiting Incorrectly Configured Access Control Security Levels.This issue affects Campaign Monitor for WordPress: from n/a through \u003c= 2.9.0."}, {"color": "#7f8c8d", "id": "ref:090725d495f4", "label": "patchstack.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e patchstack.com\n    "}, {"color": "#e74c3c", "id": "CVE-2026-0675", "label": "CVE-2026-0675", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cve\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CVE-2026-0675\n    \u003cbr\u003e\u003cbr\u003e\u003cb\u003eDescription:\u003c/b\u003e\u003cbr\u003eRejected reason: This CVE ID has been rejected or withdrawn by its CVE Numbering Authority."}, {"color": "#e74c3c", "id": "CVE-2026-0676", "label": "CVE-2026-0676", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cve\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CVE-2026-0676\n    \u003cbr\u003e\u003cbr\u003e\u003cb\u003eDescription:\u003c/b\u003e\u003cbr\u003eMissing Authorization vulnerability in G5Theme Zorka zorka allows Exploiting Incorrectly Configured Access Control Security Levels.This issue affects Zorka: from n/a through \u003c= 1.5.7."}, {"color": "#7f8c8d", "id": "ref:0610cff87654", "label": "patchstack.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e patchstack.com\n    "}, {"color": "#e74c3c", "id": "CVE-2026-21871", "label": "CVE-2026-21871", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cve\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CVE-2026-21871\n    \u003cbr\u003e\u003cbr\u003e\u003cb\u003eDescription:\u003c/b\u003e\u003cbr\u003eNiceGUI is a Python-based UI framework. From versions 2.13.0 to 3.4.1, there is a XSS risk in NiceGUI when developers pass attacker-controlled strings into ui.navigate.history.push() or ui.navigate.history.replace(). These helpers are documented as History API wrappers for updating the browser URL without page reload. However, if the URL argument is embedded into generated JavaScript without proper escaping, a crafted payload can break out of the intended string context and execute arbitrary Jav"}, {"color": "#8e44ad", "id": "cpe:2.3:a:zauberzeug:nicegui:*:*:*:*:*:*:*:*", "label": "zauberzeug:nicegui:*", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cpe\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e zauberzeug:nicegui:*\n    "}, {"color": "#7f8c8d", "id": "ref:ed016bbaa6ed", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#7f8c8d", "id": "ref:85db4dc048b3", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#e74c3c", "id": "CVE-2026-21872", "label": "CVE-2026-21872", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cve\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CVE-2026-21872\n    \u003cbr\u003e\u003cbr\u003e\u003cb\u003eDescription:\u003c/b\u003e\u003cbr\u003eNiceGUI is a Python-based UI framework. From versions 2.22.0 to 3.4.1, an unsafe implementation in the click event listener used by ui.sub_pages, combined with attacker-controlled link rendering on the page, causes XSS when the user actively clicks on the link. This issue has been patched in version 3.5.0."}, {"color": "#7f8c8d", "id": "ref:d2dd579809ba", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#e74c3c", "id": "CVE-2026-21873", "label": "CVE-2026-21873", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cve\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CVE-2026-21873\n    \u003cbr\u003e\u003cbr\u003e\u003cb\u003eDescription:\u003c/b\u003e\u003cbr\u003eNiceGUI is a Python-based UI framework. From versions 2.22.0 to 3.4.1, an unsafe implementation in the pushstate event listener used by ui.sub_pages allows an attacker to manipulate the fragment identifier of the URL, which they can do despite being cross-site, using an iframe. This issue has been patched in version 3.5.0."}, {"color": "#7f8c8d", "id": "ref:a8aee27de3f4", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#e74c3c", "id": "CVE-2026-21874", "label": "CVE-2026-21874", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cve\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CVE-2026-21874\n    \u003cbr\u003e\u003cbr\u003e\u003cb\u003eDescription:\u003c/b\u003e\u003cbr\u003eNiceGUI is a Python-based UI framework. From versions v2.10.0 to 3.4.1, an unauthenticated attacker can exhaust Redis connections by repeatedly opening and closing browser tabs on any NiceGUI application using Redis-backed storage. Connections are never released, leading to service degradation when Redis hits its connection limit. NiceGUI continues accepting new connections - errors are logged but the app stays up with broken storage functionality. This issue has been patched in version 3.5.0."}, {"color": "#f39c12", "id": "CWE-772", "label": "CWE-772", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cwe\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CWE-772\n    "}, {"color": "#7f8c8d", "id": "ref:8cacf625ba2a", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#7f8c8d", "id": "ref:3784886b390a", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#e74c3c", "id": "CVE-2026-21894", "label": "CVE-2026-21894", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cve\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CVE-2026-21894\n    \u003cbr\u003e\u003cbr\u003e\u003cb\u003eDescription:\u003c/b\u003e\u003cbr\u003en8n is an open source workflow automation platform. In versions from 0.150.0 to before 2.2.2, an authentication bypass vulnerability in the Stripe Trigger node allows unauthenticated parties to trigger workflows by sending forged Stripe webhook events. The Stripe Trigger creates and stores a Stripe webhook signing secret when registering the webhook endpoint, but incoming webhook requests were not verified against this secret. As a result, any HTTP client that knows the webhook URL could send a "}, {"color": "#f39c12", "id": "CWE-290", "label": "CWE-290", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cwe\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CWE-290\n    "}, {"color": "#7f8c8d", "id": "ref:e9ca24e7131b", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#7f8c8d", "id": "ref:adde24c16a45", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#7f8c8d", "id": "ref:948991a3db3a", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#e74c3c", "id": "CVE-2026-22242", "label": "CVE-2026-22242", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cve\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CVE-2026-22242\n    \u003cbr\u003e\u003cbr\u003e\u003cb\u003eDescription:\u003c/b\u003e\u003cbr\u003eCoreShop is a Pimcore enhanced eCommerce solution. Prior to version 4.1.8, a blind SQL injection vulnerability exists in the application that allows an authenticated administrator-level user to extract database contents using boolean-based or time-based techniques. The database account used by the application is read-only and non-DBA, limiting impact to confidential data disclosure only. No data modification or service disruption is possible. This issue has been patched in version 4.1.8."}, {"color": "#f39c12", "id": "CWE-564", "label": "CWE-564", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cwe\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CWE-564\n    "}, {"color": "#8e44ad", "id": "cpe:2.3:a:coreshop:coreshop:*:*:*:*:*:*:*:*", "label": "coreshop:coreshop:*", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cpe\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e coreshop:coreshop:*\n    "}, {"color": "#7f8c8d", "id": "ref:cfa09a5d4d53", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#7f8c8d", "id": "ref:2c46383b349b", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#e74c3c", "id": "CVE-2026-0719", "label": "CVE-2026-0719", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u00 ze": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#e74c3c", "id": "CVE-2026-21885", "label": "CVE-2026-21885", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cve\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CVE-2026-21885\n    \u003cbr\u003e\u003cbr\u003e\u003cb\u003eDescription:\u003c/b\u003e\u003cbr\u003eMiniflux 2 is an open source feed reader. Prior to version 2.2.16, Miniflux\u0027s media proxy endpoint (`GET /proxy/{encodedDigest}/{encodedURL}`) can be abused to perform Server-Side Request Forgery (SSRF). An authenticated user can cause Miniflux to generate a signed proxy URL for attacker-chosen media URLs embedded in feed entry content, including internal addresses (e.g., localhost, private RFC1918 ranges, or link-local metadata endpoints). Requesting the resulting `/proxy/...` URL makes Miniflu"}, {"color": "#8e44ad", "id": "cpe:2.3:a:miniflux_project:miniflux:*:*:*:*:*:go:*:*", "label": "miniflux_project:miniflux:*", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cpe\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e miniflux_project:miniflux:*\n    "}, {"color": "#7f8c8d", "id": "ref:17a961f92b4c", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#e74c3c", "id": "CVE-2026-21891", "label": "CVE-2026-21891", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cve\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CVE-2026-21891\n    \u003cbr\u003e\u003cbr\u003e\u003cb\u003eDescription:\u003c/b\u003e\u003cbr\u003eZimaOS is a fork of CasaOS, an operating system for Zima devices and x86-64 systems with UEFI. In versions up to and including 1.5.0, the application checks the validity of the username but appears to skip, misinterpret, or incorrectly validate the password when the provided username matches a known system service account. The application\u0027s login function fails to properly handle the password validation result for these users, effectively granting authenticated access to anyone who knows one of "}, {"color": "#8e44ad", "id": "cpe:2.3:o:zimaspace:zimaos:*:*:*:*:*:*:*:*", "label": "zimaspace:zimaos:*", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cpe\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e zimaspace:zimaos:*\n    "}, {"color": "#7f8c8d", "id": "ref:14148f828708", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#e74c3c", "id": "CVE-2026-21892", "label": "CVE-2026-21892", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cve\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CVE-2026-21892\n    \u003cbr\u003e\u003cbr\u003e\u003cb\u003eDescription:\u003c/b\u003e\u003cbr\u003eParsl is a Python parallel scripting library. A SQL Injection vulnerability exists in the parsl-visualize component of versions prior to 2026.01.05. The application constructs SQL queries using unsafe string formatting (Python % operator) with user-supplied input (workflow_id) directly from URL routes. This allows an unauthenticated attacker with access to the visualization dashboard to inject arbitrary SQL commands, potentially leading to data exfiltration or denial of service against the monit"}, {"color": "#8e44ad", "id": "cpe:2.3:a:uchicago:parsl:*:*:*:*:*:python:*:*", "label": "uchicago:parsl:*", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cpe\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e uchicago:parsl:*\n    "}, {"color": "#7f8c8d", "id": "ref:14668e68db56", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#7f8c8d", "id": "ref:bd89a90cc357", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#e74c3c", "id": "CVE-2026-21895", "label": "CVE-2026-21895", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cve\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CVE-2026-21895\n    \u003cbr\u003e\u003cbr\u003e\u003cb\u003eDescription:\u003c/b\u003e\u003cbr\u003eThe `rsa` crate is an RSA implementation written in rust. Prior to version 0.9.10, when creating a RSA private key from its components, the construction panics instead of returning an error when one of the primes is `1`. Version 0.9.10 fixes the issue."}, {"color": "#7f8c8d", "id": "ref:159bf7ea4a11", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#7f8c8d", "id": "ref:ca451ddcedbf", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#e74c3c", "id": "CVE-2026-22028", "label": "CVE-2026-22028", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cve\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CVE-2026-22028\n    \u003cbr\u003e\u003cbr\u003e\u003cb\u003eDescription:\u003c/b\u003e\u003cbr\u003ePreact, a lightweight web development framework, JSON serialization protection to prevent Virtual DOM elements from being constructed from arbitrary JSON. A regression introduced in Preact 10.26.5 caused this protection to be softened. In applications where values from JSON payloads are assumed to be strings and passed unmodified to Preact as children, a ustFS IAM allows a restricted service account or STS credential to self-issue an unrestricted service account, inheriting the parent\u2019s full privileges. This enables privilege escalation and bypass of session/inline policy restrictions. Version 1.0.0-alpha.79 fixes the issue."}, {"color": "#f39c12", "id": "CWE-522", "label": "CWE-522", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cwe\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CWE-522\n    "}, {"color": "#7f8c8d", "id": "ref:8b115bcbdc3a", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#e74c3c", "id": "CVE-2026-22241", "label": "CVE-2026-22241", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cve\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CVE-2026-22241\n    \u003cbr\u003e\u003cbr\u003e\u003cb\u003eDescription:\u003c/b\u003e\u003cbr\u003eThe Open eClass platform (formerly known as GUnet eClass) is a complete course management system. Prior to version 4.2, an arbitrary file upload vulnerability in the theme import functionality enables an attacker with administrative privileges to upload arbitrary files on the server\u0027s file system. The main cause of the issue is that no validation or sanitization of the file\u0027s present inside the zip archive. This leads to remote code execution on the web server. Version 4.2 patches the issue."}, {"color": "#8e44ad", "id": "cpe:2.3:a:openeclass:openeclass:*:*:*:*:*:*:*:*", "label": "openeclass:openeclass:*", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cpe\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e openeclass:openeclass:*\n    "}, {"color": "#7f8c8d", "id": "ref:2245a2169788", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb is leads to reflected XSS using the fact that request path is decoded and normalized in the matching stage but not is inserted raw in the html view (current.path), the only constraint here is for the root path (eg. /files in the PoC example) to have a sub directory (e.g c"}, {"color": "#7f8c8d", "id": "ref:584525a3090b", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#7f8c8d", "id": "ref:575cd23c50f9", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#e74c3c", "id": "CVE-2026-22257", "label": "CVE-2026-22257", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cve\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CVE-2026-22257\n    \u003cbr\u003e\u003cbr\u003e\u003cb\u003eDescription:\u003c/b\u003e\u003cbr\u003eSalvo is a Rust web backend framework. Prior to version 0.88.1, the function list_html generates a file view of a folder without sanitizing the files or folders names, this may potentially lead to XSS in cases where a website allow the access to public files using this feature and anyone can upload a file. This issue has been patched in version 0.88.1."}, {"color": "#7f8c8d", "id": "ref:0f7957686805", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#7f8c8d", "id": "ref:43d0ed2caed5", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#e74c3c", "id": "CVE-2026-0747", "label": "CVE-2026-0747", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u00 ses ptr + strlen(ptr) + 1 which reads one byte past allocated buffer boundaries "}, {"color": "#7f8c8d", "id": "ref:3a366789e1e6", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#7f8c8d", "id": "ref:a730a85c9a96", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#e74c3c", "id": "CVE-2026-22023", "label": "CVE-2026-22023", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cve\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CVE-2026-22023\n    \u003cbr\u003e\u003cbr\u003e\u003cb\u003eDescription:\u003c/b\u003e\u003cbr\u003eCryptoLib provides a software-only solution using the CCSDS Space Data Link Security Protocol - Extended Procedures (SDLS-EP) to secure communications between a spacecraft running the core Flight System (cFS) and a ground station. Prior to version 1.4.3, there is an out-of-bounds heap read vulnerability in cryptography_aead_encrypt(). This issue has been patched in version 1.4.3."}, {"color": "#7f8c8d", "id": "ref:5fb67454c37c", "label": "github.com", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e reference\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e github.com\n    "}, {"color": "#e74c3c", "id": "CVE-2026-22024", "label": "CVE-2026-22024", "shape": "dot", "size": 12, "title": "\n    \u003cb\u003eType:\u003c/b\u003e cve\u003cbr\u003e\n    \u003cb\u003eName:\u003c/b\u003e CVE-2026-22024\n    \u003cbr\u003e\u003cbr\u003e\u003cb\u003eDescription:\u003c/b\u003e\u003cbr\u003eCryptoLib provides a software-only solution using the CCSDS Space Data Link Security Protocol - Extended Procedures (SDLS-EP) to secure communications between a spacecraft running the core Flight System (cFS) and a ground station.
